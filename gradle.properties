# Project-wide Gradle settings.
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
android.useAndroidX=true
android.enableJetifier=true
kotlin.code.style=official
android.nonTransitiveRClass=true

# App version — single source of truth (read by app/build.gradle.kts).
# VERSION_CODE: integer Play orders builds by; must be strictly higher than any code already
#   uploaded, app-wide (users never see it). Scheme: YYYYMMDD of the release day, set manually.
#   One uploadable build per day — for a rare same-day rebuild, just +1 (borrow the next day) or
#   append a 2-digit counter (YYYYMMDDNN). Never decrease it.
# VERSION_NAME: the user-facing label. Use SemVer MAJOR.MINOR.PATCH; bump when it's meaningful.
# CI/local override without editing this file: -PVERSION_CODE=20260713 -PVERSION_NAME=1.2.3
VERSION_CODE=20260713
VERSION_NAME=1.0
